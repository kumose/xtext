name: macOS CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DKMCMAKE_BUILD_TEST=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure
